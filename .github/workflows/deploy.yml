# TestFlight 배포 — 수동 실행(workflow_dispatch). 클라우드 맥 러너에서 빌드·서명·업로드.
# 로컬 맥 불필요. 필요한 GitHub Secrets는 docs/DEPLOY.md 참고.
name: Deploy TestFlight

on:
  workflow_dispatch:

# match가 서명 저장 브랜치(match-storage)에 push하므로 쓰기 권한 필요.
permissions:
  contents: write

jobs:
  deploy:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby (fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Write Secrets.xcconfig
        # 시크릿을 스크립트에 직접 박으면 bash가 값 안의 $()·백틱을 실행해 xcconfig의 //주석 회피
        # 트릭($())을 깨뜨림 → URL이 https:로 잘려 앱이 켜자마자 크래시. 환경변수로 넘겨 원문 그대로 기록.
        env:
          SECRETS_XCCONFIG: ${{ secrets.SECRETS_XCCONFIG }}
        run: printf '%s\n' "$SECRETS_XCCONFIG" > Secrets.xcconfig

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Deploy to TestFlight
        run: bundle exec fastlane beta
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: https://github.com/mjkang0987/clipnote-ios.git
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
