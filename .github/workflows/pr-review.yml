# 자동 검증 (iOS 빌드) — XcodeGen 생성 + xcodebuild build.
# AI 코드리뷰는 작성자(Claude)가 절차 5단계(/code-review)에서 세션 내에서 수행한다.
# 이 CI는 자동 게이트: 컴파일 오류를 머지 전에 잡는다.
# 트리거: PR(opened/synchronize/reopened) + `claude/**` 작업 브랜치 push(PR 없이도 빌드 확인).
# 주의: macOS 러너 사용 — 비공개 저장소에서는 분(minutes)이 Linux의 10배로 차감된다.
name: CI

on:
  push:
    branches:
      - "claude/**"
    paths-ignore:
      - "**/*.md"
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**/*.md"

# 같은 브랜치의 push와 PR 이벤트가 동시에 떠도 빌드는 하나만(오래된 건 취소).
# push는 head_ref가 없어 ref_name으로 폴백 → PR과 동일 그룹으로 묶여 중복 빌드 방지.
concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    # push는 항상(원본 저장소 브랜치), PR은 포크가 아닐 때만(보안).
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Prepare Secrets (빌드용 더미 — 실제 값 아님)
        run: cp Secrets.example.xcconfig Secrets.xcconfig

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project ClipNote.xcodeproj \
            -scheme ClipNote \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
