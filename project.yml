name: ClipNote
options:
  bundleIdPrefix: kr.co.clipnote
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  ClipNote:
    type: application
    platform: iOS
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    sources:
      - ClipNote
    info:
      path: ClipNote/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLName: kr.co.clipnote.app
            CFBundleURLSchemes:
              - clipnote
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        API_BASE: $(API_BASE)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.co.clipnote.app
        GENERATE_INFOPLIST_FILE: false
  ClipNoteTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ClipNoteTests
    dependencies:
      - target: ClipNote
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
schemes:
  ClipNote:
    build:
      targets:
        ClipNote: all
    test:
      targets:
        - ClipNoteTests
