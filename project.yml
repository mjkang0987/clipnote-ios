name: ClipNote
options:
  bundleIdPrefix: kr.co.clipnote
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.51.0"
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "12.0.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "4"
    DEVELOPMENT_TEAM: "928S75PVRK"
targets:
  ClipNote:
    type: application
    platform: iOS
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    sources:
      - ClipNote
    dependencies:
      - target: ClipNoteShare
      - package: Supabase
        product: Supabase
      - package: GoogleMobileAds
        product: GoogleMobileAds
    info:
      path: ClipNote/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLName: kr.co.clipnote.app
            CFBundleURLSchemes:
              - clipnote
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        API_BASE: $(API_BASE)
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        NAVER_CLIENT_ID: $(NAVER_CLIENT_ID)
        GADApplicationIdentifier: $(ADMOB_APP_ID)
        ADMOB_BANNER_UNIT_ID: $(ADMOB_BANNER_UNIT_ID)
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
          - SKAdNetworkIdentifier: 4fzdc2evr5.skadnetwork
          - SKAdNetworkIdentifier: 2fnua5tdw4.skadnetwork
          - SKAdNetworkIdentifier: ydx93a7ass.skadnetwork
          - SKAdNetworkIdentifier: 5a6flpkh64.skadnetwork
          - SKAdNetworkIdentifier: p78axxw29g.skadnetwork
          - SKAdNetworkIdentifier: v72qych5uu.skadnetwork
          - SKAdNetworkIdentifier: c6k4g5qg8m.skadnetwork
          - SKAdNetworkIdentifier: s39g8k73mm.skadnetwork
          - SKAdNetworkIdentifier: 3qy4746246.skadnetwork
          - SKAdNetworkIdentifier: f38h382jlk.skadnetwork
          - SKAdNetworkIdentifier: hs6bdukanm.skadnetwork
          - SKAdNetworkIdentifier: v4nxqhlyqp.skadnetwork
          - SKAdNetworkIdentifier: wzmmz9fp6w.skadnetwork
          - SKAdNetworkIdentifier: yclnxrl5pm.skadnetwork
          - SKAdNetworkIdentifier: t38b2kh725.skadnetwork
          - SKAdNetworkIdentifier: 7ug5zh24hu.skadnetwork
          - SKAdNetworkIdentifier: 9rd848q2bz.skadnetwork
          - SKAdNetworkIdentifier: n6fk4nfna4.skadnetwork
          - SKAdNetworkIdentifier: kbd757ywx3.skadnetwork
          - SKAdNetworkIdentifier: 9t245vhmpl.skadnetwork
          - SKAdNetworkIdentifier: 4468km3ulz.skadnetwork
          - SKAdNetworkIdentifier: 2u9pt9hc89.skadnetwork
          - SKAdNetworkIdentifier: 8s468mfl3y.skadnetwork
          - SKAdNetworkIdentifier: klf5c3l5u5.skadnetwork
          - SKAdNetworkIdentifier: ppxm28t8ap.skadnetwork
          - SKAdNetworkIdentifier: ecpz2srf59.skadnetwork
          - SKAdNetworkIdentifier: uw77j35x4d.skadnetwork
          - SKAdNetworkIdentifier: pwa73g5rt2.skadnetwork
          - SKAdNetworkIdentifier: mlmmfzh3r3.skadnetwork
          - SKAdNetworkIdentifier: 578prtvx9j.skadnetwork
          - SKAdNetworkIdentifier: 4dzt52r2t5.skadnetwork
          - SKAdNetworkIdentifier: e5fvkxwrpn.skadnetwork
          - SKAdNetworkIdentifier: 8c4e2ghe7u.skadnetwork
          - SKAdNetworkIdentifier: zq492l623r.skadnetwork
          - SKAdNetworkIdentifier: 3rd42ekr43.skadnetwork
          - SKAdNetworkIdentifier: 3qcr597p9d.skadnetwork
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.co.clipnote.app
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: "928S75PVRK"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "kr.co.clipnote.app AppStore"
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        # 릴리스(TestFlight)는 fastlane match가 만든 프로파일 사용. Debug/로컬은 base 그대로.
        Release:
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore kr.co.clipnote.app"
  ClipNoteShare:
    type: app-extension
    platform: iOS
    sources:
      - ClipNoteShare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.co.clipnote.app.Share
        GENERATE_INFOPLIST_FILE: false
        DEVELOPMENT_TEAM: "928S75PVRK"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "kr.co.clipnote.app.Share AppStore"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_CFBundleDisplayName: ClipNote
      configs:
        # 릴리스(TestFlight)는 fastlane match가 만든 프로파일 사용. Debug/로컬은 base 그대로.
        Release:
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore kr.co.clipnote.app.Share"
    info:
      path: ClipNoteShare/Info.plist
      properties:
        CFBundleDisplayName: ClipNote
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true

  ClipNoteTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ClipNoteTests
    dependencies:
      - target: ClipNote
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
schemes:
  ClipNote:
    build:
      targets:
        ClipNote: all
    test:
      targets:
        - ClipNoteTests
