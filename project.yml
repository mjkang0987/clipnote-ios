    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.co.clipnote.app
        GENERATE_INFOPLIST_FILE: false
  ClipNoteTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ClipNoteTests
    dependencies:
      - target: ClipNote
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
schemes:
  ClipNote:
    build:
      targets:
        ClipNote: all
    test:
      targets:
        - ClipNoteTests
